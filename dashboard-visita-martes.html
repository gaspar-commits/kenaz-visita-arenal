  } catch (e) { return {}; }
}
function saveState(s) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
}

let state = loadState();
NEGOCIOS.forEach(n => {
  if (!state[n.id]) {
    state[n.id] = { status: 'pendiente', notes: '', history: [], open: false };
  }
  if (!state[n.id].history) state[n.id].history = [];
  if (typeof state[n.id].open !== 'boolean') state[n.id].open = false;
});

let filters = { cluster: 'all', state: 'all', tier: 'all', search: '' };

const $app = document.getElementById('app');

function el(tag, opts = {}, children = []) {
  const node = document.createElement(tag);
  if (opts.className) node.className = opts.className;
  if (opts.text != null) node.textContent = opts.text;
  if (opts.attrs) {
    for (const k in opts.attrs) {
      if (opts.attrs[k] != null) node.setAttribute(k, opts.attrs[k]);
    }
  }
  if (opts.dataset) {
    for (const k in opts.dataset) node.dataset[k] = opts.dataset[k];
  }
  if (opts.value != null) node.value = opts.value;
  (children || []).forEach(c => {
    if (c == null) return;
    if (typeof c === 'string') node.appendChild(document.createTextNode(c));
    else node.appendChild(c);
  });
  return node;
}

function fmtTime(d) {
  const p = n => n.toString().padStart(2, '0');
  return p(d.getHours()) + ':' + p(d.getMinutes());
}

function statePill(st) {
  return el('span', { className: 'pill st-' + st, text: STATES[st].label });
}

function negocioCard(n) {
  const s = state[n.id];
  const card = el('article', {
    className: 'card st-' + s.status + (s.open ? ' open' : ''),
    dataset: { id: n.id, cluster: n.cluster, tier: n.tier, state: s.status }
  });

  // HEAD
  const head = el('div', {
    className: 'card-head',
    dataset: { act: 'toggle', id: n.id }
  });
  head.appendChild(el('span', { className: 'chev', text: '›' }));
  const nameBox = el('div', { className: 'card-name' });
  nameBox.appendChild(el('span', { className: 'n', text: n.nombre }));
  nameBox.appendChild(el('span', { className: 'sub', text: n.desc }));
  head.appendChild(nameBox);
  head.appendChild(el('span', { className: 'pill tier-' + n.tier, text: 'T' + n.tier }));
  head.appendChild(statePill(s.status));
  card.appendChild(head);

  // BODY
  const body = el('div', { className: 'card-body' });

  // dir row
  const dirRow = el('div', { className: 'row' });
  const dirMeta = el('span', { className: 'meta' });
  dirMeta.appendChild(el('span', { className: 'lbl-inline', text: 'Dir' }));
  dirMeta.appendChild(el('b', { text: n.direccion }));
  dirRow.appendChild(dirMeta);
  body.appendChild(dirRow);

  // franja + score
  const franjaRow = el('div', { className: 'row' });
  const franjaMeta = el('span', { className: 'meta' });
  franjaMeta.appendChild(el('span', { className: 'lbl-inline', text: 'Franja' }));
  franjaMeta.appendChild(document.createTextNode(n.franja));
  franjaRow.appendChild(franjaMeta);
  if (n.score) {
    const scoreMeta = el('span', { className: 'meta' });
    scoreMeta.appendChild(el('span', { className: 'lbl-inline', text: 'Score' }));
    scoreMeta.appendChild(el('b', { text: n.score.toFixed(1) }));
    franjaRow.appendChild(scoreMeta);
  }
  body.appendChild(franjaRow);

  // tel row
  const telRow = el('div', { className: 'row' });
  if (n.tel) {
    const a = el('a', {
      className: 'tel-btn',
      attrs: { href: 'tel:' + n.tel.replace(/\s/g, '') },
      text: 'CALL ' + n.tel
    });
    telRow.appendChild(a);
  } else {
    const telMeta = el('span', { className: 'meta' });
    telMeta.appendChild(el('span', { className: 'lbl-inline', text: 'Tel' }));
    telMeta.appendChild(document.createTextNode(n.telNote || 'verificar'));
    telRow.appendChild(telMeta);
  }
  body.appendChild(telRow);

  // warn
  if (n.warn) {
    body.appendChild(el('div', { className: 'warn', text: '⚠ ' + n.warn }));
  }

  // links
  const links = el('div', { className: 'links' });
  const linkBtn = (label, href, full) => {
    if (href) {
      return el('a', {
        className: 'link-btn' + (full ? ' full' : ''),
        attrs: { href: href, target: '_blank', rel: 'noopener' },
        text: label
      });
    }
    return el('span', { className: 'link-btn disabled' + (full ? ' full' : ''), text: label });
  };
  links.appendChild(linkBtn('WEB', n.web, false));
  links.appendChild(linkBtn(n.cartaDigital ? 'CARTA DIGITAL' : 'CARTA DIG', n.cartaDigital, false));
  if (n.cartaPDF) {
    links.appendChild(linkBtn('CARTA PDF', n.cartaPDF, true));
  }
  body.appendChild(links);

  // state buttons
  const stBtns = el('div', { className: 'state-buttons' });
  [
    ['visitado', 'Visitado'],
    ['interesado', 'Interesado'],
    ['firmado', 'Firmado'],
    ['no', 'No interes']
  ].forEach(([st, lbl]) => {
    const b = el('button', {
      className: 'state-btn s-' + st + (s.status === st ? ' active' : ''),
      dataset: { act: 'set', id: n.id, st: st }
    });
    b.appendChild(el('span', { text: lbl }));
    stBtns.appendChild(b);
  });
  body.appendChild(stBtns);

  // notes
  const notes = el('textarea', {
    className: 'notes',
    attrs: { placeholder: 'Notas del cliente (lo que diga textual)...' },
    dataset: { act: 'notes', id: n.id },
    value: s.notes || ''
  });
  body.appendChild(notes);

  // history
  if (s.history.length) {
    const hist = el('div', { className: 'history' });
    hist.appendChild(el('div', { className: 'history-title', text: 'Historial' }));
    const ul = el('ul');
    s.history.slice().reverse().forEach(h => {
      const li = el('li');
      li.appendChild(el('span', { className: 'ts', text: h.ts }));
      li.appendChild(document.createTextNode((STATES[h.st] && STATES[h.st].label) || h.st));
      ul.appendChild(li);
    });
    hist.appendChild(ul);
    body.appendChild(hist);
  }

  card.appendChild(body);
  return card;
}

function render() {
  // Clear app
  while ($app.firstChild) $app.removeChild($app.firstChild);

  const grouped = {};
  NEGOCIOS.forEach(n => {
    if (!grouped[n.cluster]) grouped[n.cluster] = [];
    grouped[n.cluster].push(n);
  });

  Object.keys(grouped).sort().forEach(c => {
    const ci = CLUSTERS[c];
    const section = el('section', {
      className: 'cluster',
      dataset: { cluster: c }
    });
    const ch = el('div', { className: 'cluster-header' });
    ch.appendChild(el('h2', { text: ci.label }));
    ch.appendChild(el('span', { className: 'loc', text: ci.loc }));
    section.appendChild(ch);
    grouped[c].forEach(n => section.appendChild(negocioCard(n)));
    $app.appendChild(section);
  });

  applyFilters();
  updateMetrics();
}

function applyFilters() {
  const q = filters.search.trim().toLowerCase();
  document.querySelectorAll('.card').forEach(elc => {
    const id = elc.dataset.id;
    const n = NEGOCIOS.find(x => x.id === id);
    const s = state[id];

    let visible = true;
    if (filters.cluster !== 'all' && String(n.cluster) !== filters.cluster) visible = false;
    if (filters.state !== 'all' && s.status !== filters.state) visible = false;
    if (filters.tier !== 'all' && n.tier !== filters.tier) visible = false;
    if (q) {
      const hay = [n.nombre, n.direccion, n.desc, n.tel || ''].join(' ').toLowerCase();
      if (!hay.includes(q)) visible = false;
    }
    elc.classList.toggle('hidden', !visible);
  });

  document.querySelectorAll('.cluster').forEach(cl => {
    const anyVisible = cl.querySelectorAll('.card:not(.hidden)').length > 0;
    cl.style.display = anyVisible ? '' : 'none';
  });
}

function updateMetrics() {
  const counts = { total: NEGOCIOS.length, visitado: 0, interesado: 0, firmado: 0, no: 0 };
  NEGOCIOS.forEach(n => {
    const st = state[n.id].status;
    if (st !== 'pendiente') counts[st] = (counts[st] || 0) + 1;
  });
  document.getElementById('m-total').textContent = counts.total;
  document.getElementById('m-visitado').textContent = counts.visitado;
  document.getElementById('m-interesado').textContent = counts.interesado;
  document.getElementById('m-firmado').textContent = counts.firmado;
  document.getElementById('m-no').textContent = counts.no;
}

function setStatus(id, st) {
  const prev = state[id].status;
  if (prev === st) {
    state[id].status = 'pendiente';
  } else {
    state[id].status = st;
  }
  const d = new Date();
  state[id].history.push({ ts: fmtTime(d), st: state[id].status });
  saveState(state);
  render();
}

function toggleCard(id) {
  state[id].open = !state[id].open;
  saveState(state);
  const c = document.querySelector('.card[data-id="' + id + '"]');
  if (c) c.classList.toggle('open', state[id].open);
}

function setNotes(id, val) {
  state[id].notes = val;
  saveState(state);
}

document.addEventListener('click', (e) => {
  const t = e.target.closest('[data-act]');
  if (!t) return;
  const act = t.dataset.act;
  const id = t.dataset.id;
  if (act === 'toggle') toggleCard(id);
  else if (act === 'set') setStatus(id, t.dataset.st);
});

document.addEventListener('input', (e) => {
  if (e.target.matches('textarea[data-act="notes"]')) {
    setNotes(e.target.dataset.id, e.target.value);
  }
  if (e.target.id === 'search') {
    filters.search = e.target.value;
    applyFilters();
  }
});

document.querySelectorAll('.f-cluster').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.f-cluster').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    filters.cluster = b.dataset.cluster;
    applyFilters();
  });
});
document.querySelectorAll('.f-state').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.f-state').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    filters.state = b.dataset.state;
    applyFilters();
  });
});
document.querySelectorAll('.f-tier').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.f-tier').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    filters.tier = b.dataset.tier;
    applyFilters();
  });
});

document.getElementById('reset-btn').addEventListener('click', () => {
  if (!confirm('Borrar TODO el progreso de la visita?')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = {};
  NEGOCIOS.forEach(n => {
    state[n.id] = { status: 'pendiente', notes: '', history: [], open: false };
  });
  saveState(state);
  render();
});

function tickClock() {
  document.getElementById('clock').textContent = fmtTime(new Date());
}
setInterval(tickClock, 30000);
tickClock();

render();
</script>
</body>
</html>
