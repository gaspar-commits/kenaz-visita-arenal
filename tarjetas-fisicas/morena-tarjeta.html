<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Kenaz · Tarjeta · Morena Restobar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     Kenaz · Tarjeta fisica 85x55mm
     Imprimible en cualquier copisteria de Calpe.
     Diseno: blanco/negro estricto. Sin acentos. Sin adornos.
     ============================================================ */

  @page {
    size: 85mm 55mm;
    margin: 0;
  }

  *, *::before, *::after { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: #f2f2f2;
    color: #050505;
    -webkit-font-smoothing: antialiased;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
    color-adjust: exact;
  }

  body {
    font-family: 'Share Tech Mono', monospace;
    font-size: 7pt;
    line-height: 1.35;
  }

  /* Cada tarjeta ocupa una pagina A complete card = single @page */
  .card {
    width: 85mm;
    height: 55mm;
    page-break-after: always;
    break-after: page;
    position: relative;
    overflow: hidden;
    padding: 5mm;
    display: flex;
    flex-direction: column;
  }

  .card:last-child {
    page-break-after: auto;
    break-after: auto;
  }

  /* -------- FRENTE -------- */
  .front {
    background: #f2f2f2;
    color: #050505;
  }

  .front-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 3mm;
  }

  .runa {
    width: 7mm;
    height: 7mm;
    flex-shrink: 0;
  }

  .runa svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  .brand-block {
    text-align: right;
    line-height: 1.1;
  }

  .brand-name {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 9pt;
    letter-spacing: 0.18em;
    margin: 0;
  }

  .brand-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 5.5pt;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 0.5mm;
    opacity: 0.7;
  }

  .sep {
    height: 0.5pt;
    background: #050505;
    margin: 2.5mm 0 2mm;
    opacity: 0.85;
  }

  .tagline {
    font-family: 'Share Tech Mono', monospace;
    font-size: 5.5pt;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    opacity: 0.7;
  }

  .negocio-name {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 11pt;
    letter-spacing: 0.04em;
    line-height: 1.05;
    margin-top: 1mm;
    /* Si el nombre es muy largo, encoge un poco */
    word-break: break-word;
  }

  .qr-block {
    margin-top: auto;
    display: flex;
    align-items: center;
    gap: 3mm;
  }

  .qr-img {
    width: 22mm;
    height: 22mm;
    display: block;
    flex-shrink: 0;
    background: #f2f2f2;
  }

  .qr-caption {
    font-family: 'Share Tech Mono', monospace;
    font-size: 5.5pt;
    line-height: 1.35;
    letter-spacing: 0.05em;
    color: #050505;
  }

  .qr-caption strong {
    display: block;
    font-weight: normal;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    font-size: 5pt;
    margin-bottom: 0.8mm;
    opacity: 0.7;
  }

  /* -------- DORSO -------- */
  .back {
    background: #050505;
    color: #f2f2f2;
  }

  .back .sep {
    background: #f2f2f2;
    opacity: 0.6;
  }

  .back-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 3mm;
  }

  .back-runa svg path {
    stroke: #f2f2f2;
  }

  .person-name {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 10pt;
    letter-spacing: 0.06em;
    margin: 0;
  }

  .person-role {
    font-family: 'Share Tech Mono', monospace;
    font-size: 5.5pt;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin-top: 0.6mm;
    opacity: 0.7;
  }

  .contact-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1mm;
    margin-top: 1.5mm;
  }

  .contact-row {
    display: flex;
    align-items: baseline;
    gap: 2.5mm;
    font-family: 'Share Tech Mono', monospace;
    font-size: 7pt;
    line-height: 1.2;
  }

  .contact-label {
    font-size: 5pt;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    opacity: 0.55;
    min-width: 10mm;
  }

  .contact-value {
    font-size: 7pt;
    letter-spacing: 0.04em;
  }

  .back-bottom {
    margin-top: auto;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 3mm;
  }

  .location {
    font-family: 'Share Tech Mono', monospace;
    font-size: 5.5pt;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    opacity: 0.7;
  }

  .url {
    font-family: 'Orbitron', sans-serif;
    font-weight: 500;
    font-size: 7pt;
    letter-spacing: 0.1em;
  }

  /* Marca de corte sutil (no necesaria para imprenta digital pero ayuda al ojo) */
  .corner-mark {
    position: absolute;
    width: 3mm;
    height: 3mm;
    pointer-events: none;
  }
</style>
</head>
